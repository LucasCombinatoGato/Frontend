<h1>Olá, {{nome}}</h1>
<h3>Interpolação</h3>
<br>

<h3>Property Biding</h3>
<img [src]="imgUrl" alt="" width="300">
<br>
<button class="btn btn-primary" [disabled]= "botaoStatus">Salvar Alterações</button>

<article>
  <h3>Class e Style Binding Dinâmico</h3>

  <p>Selecione uma Categoria de Alerta:</p>

  <select [(ngModel)]= "classeAlerta" class="form-module" title="A">
    <option value="alert-success">Sucesso</option>
    <option value="alert-info">Informativo</option>
    <option value="alert-warning">Aviso</option>
    <option value="alert-danger">Erro</option>
  </select>

  <br>

  <div class="alert {{ classeAlerta }}" role="alert">
    Texto coorido dinamicamente via interpolação de classe
  </div>

</article>
